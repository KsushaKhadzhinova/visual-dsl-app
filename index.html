<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="DiagramCode — профессиональная IDE для визуализации диаграмм из кода (DSL).">
    <title>DiagramCode — Visual DSL Diagrammer IDE</title>
    
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap">
    
    <link rel="stylesheet" href="css/styles.css">
    <!-- JS подключается как модуль (ЛР 5/6) -->
    <script type="module" src="js/script.js"></script>
</head>

<body class="page" itemscope itemtype="https://schema.org/SoftwareApplication">
    <!-- Микроразметка Schema.org -->
    <meta itemprop="applicationCategory" content="DeveloperApplication">
    <meta itemprop="operatingSystem" content="Web">
    <meta itemprop="name" content="DiagramCode">

    <!-- Доступность: Переход для скринридеров (ЛР 3) -->
    <a href="#main-content" class="skip-link">Пропустить навигацию</a>

    <header class="header">
        <div class="header__brand" itemprop="publisher" itemscope itemtype="https://schema.org/Organization">
            <div class="header__logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Logo DiagramCode">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
            </div>
            <span class="header__title" itemprop="name">DiagramCode</span>
        </div>

        <nav class="header__nav" id="mobile-nav" aria-label="Главная навигация">
            <ul class="header__menu">
                <li class="header__item"><a href="#" class="header__link">Mermaid</a></li>
                <li class="header__item"><a href="#" class="header__link">PlantUML</a></li>
                <li class="header__item desktop-only">
                    <button class="button button--primary button--run">Run</button>
                </li>
                <li class="header__item">
                    <button class="button button--ai" aria-controls="ai-modal">AI Prompt</button>
                </li>
            </ul>
        </nav>

        <div class="header__controls">
            <!-- Бургер для мобильных устройств (ЛР 4/5) -->
            <button class="header__burger" id="burger-btn" aria-expanded="false" aria-controls="mobile-nav">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="workspace" id="main-content">
        <!-- Скрытый H1 для SEO/A11y (ЛР 3) -->
        <h1 class="visually-hidden">Интерактивный редактор DSL диаграмм</h1>

        <!-- Боковая панель меню (ЛР 3 Aside) -->
        <aside class="workspace__sidebar sidebar">
            <h2 class="sidebar__title">Настройки</h2>
            <div class="sidebar__section">
                <label for="engine-select">Notation</label>
                <select id="engine-select" class="sidebar__select">
                    <option value="mermaid">Mermaid.js</option>
                    <option value="plantuml">PlantUML</option>
                </select>
            </div>
        </aside>

        <!-- Основная область IDE (Grid/Flex в ЛР 4) -->
        <section class="workspace__editor editor">
            <div class="editor__header">
                <h2 class="editor__label">Source Code</h2>
            </div>
            <textarea class="editor__field" id="dsl-input" spellcheck="false" aria-label="DSL Code Editor">graph TD
    A[Start] --> B{Is it working?}
    B -->|Yes| C[Great!]
    B -->|No| D[Debug]
    D --> B
    C --> E[End]</textarea>
        </section>

        <!-- Область визуализации (ЛР 4 Canvas) -->
        <section class="workspace__preview preview">
            <div class="preview__toolbar">
                <h2 class="preview__label">Preview</h2>
                <button class="button button--outline" aria-controls="export-modal">Export SVG</button>
            </div>
            <div class="preview__canvas" id="diagram-canvas">
                <img src="images/placeholder.svg" alt="Preview Diagram Image" class="preview__svg">
            </div>
        </section>
    </main>

    <!-- Подвал (Status Bar в ЛР 3) -->
    <footer class="footer status-bar">
        <div class="status-bar__info">
            <span class="status-dot status-dot--active" id="net-dot"></span>
            <span id="net-status">Engine: Connected</span>
        </div>
        <div class="status-bar__credits">
            <span>Ксения Хаджинова</span>
            <span class="status-bar__divider">|</span>
            <span>Вариант 13</span>
        </div>
    </footer>

    <!-- Модальное окно ИИ (ЛР 5) -->
    <div class="modal" id="ai-modal" role="dialog" aria-modal="true" aria-labelledby="ai-title">
        <div class="modal__content">
            <button class="modal__close" data-close aria-label="Close modal">&times;</button>
            <form id="ai-form" class="ai-form">
                <h2 class="ai-form__title" id="ai-title">AI Diagram Generator</h2>
                <div class="form-group">
                    <label for="ai-prompt">Enter prompt for diagram:</label>
                    <textarea id="ai-prompt" placeholder="Describe your logic..." required></textarea>
                    <span class="error-msg" id="error-prompt"></span>
                </div>
                <div class="modal__actions">
                    <button type="submit" class="button button--primary">Generate Code</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Контейнер для всплывающих уведомлений (ЛР 5 Toasts) -->
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
